name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mini-shop/package-lock.json

      - name: Install dependencies
        working-directory: mini-shop
        run: npm ci

      - name: Start server health check
        working-directory: mini-shop
        run: |
          node server.js &
          sleep 3
          curl -f http://localhost:3000/api/products || exit 1
          kill %1
